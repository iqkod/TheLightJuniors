<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Light Juniors - Quiz & Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDKs (CDN Version for HTML) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // നിങ്ങളുടെ വിവരങ്ങൾ ഇവിടെ ചേർത്തു
        const firebaseConfig = {
            apiKey: "AIzaSyCi-CtVFqpD4nczjeNfuLbTwMz_DJh99Sg",
            authDomain: "thelightjuniors.firebaseapp.com",
            projectId: "thelightjuniors",
            storageBucket: "thelightjuniors.firebasestorage.app",
            messagingSenderId: "961257050705",
            appId: "1:961257050705:web:2914677489b0c488979e70",
            measurementId: "G-0LSV2F4YF7"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // സന്ദർശകനെ ഓട്ടോമാറ്റിക്കായി ലോഗിൻ ചെയ്യിപ്പിക്കുന്നു (Anonymous)
        async function initApp() {
            try {
                await signInAnonymously(auth);
                console.log("Logged in anonymously");
            } catch (error) {
                console.error("Login failed", error);
            }
        }
        initApp();

        // ഡാറ്റ സേവ് ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
        window.saveQuizResult = async (studentName, finalScore) => {
            const statusDiv = document.getElementById('status-message');
            statusDiv.innerText = "സേവ് ചെയ്യുന്നു...";
            
            try {
                const user = auth.currentUser;
                if (!user) throw new Error("Not logged in");

                // Firestore-ലെ 'quiz_results' എന്ന കളക്ഷനിലേക്ക് ഡാറ്റ അയക്കുന്നു
                await addDoc(collection(db, "quiz_results"), {
                    name: studentName,
                    score: finalScore,
                    uid: user.uid,
                    timestamp: serverTimestamp()
                });

                statusDiv.innerHTML = "<span class='text-green-600'>വിജയകരമായി സേവ് ചെയ്തു! ✅</span>";
                document.getElementById('save-btn').disabled = true;
                document.getElementById('save-btn').classList.add('bg-gray-400');
            } catch (e) {
                console.error("Error: ", e);
                statusDiv.innerHTML = "<span class='text-red-600'>സേവ് ചെയ്യാൻ പറ്റിയില്ല. Firebase Rules പരിശോധിക്കുക.</span>";
            }
        };
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-indigo-600 tracking-tight">THE LIGHT JUNIORS</h1>
            <p class="text-slate-500 text-sm mt-1 uppercase font-bold tracking-widest">Quiz Competition</p>
        </div>

        <!-- Step 1: Name Input -->
        <div id="step-1">
            <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">വിദ്യാർത്ഥിയുടെ പേര്:</label>
            <input type="text" id="user-name" placeholder="നിങ്ങളുടെ പേര് ടൈപ്പ് ചെയ്യുക" 
                class="w-full p-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all text-lg font-medium">
            <button onclick="startQuiz()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all">
                ക്വിസ് തുടങ്ങാം
            </button>
        </div>

        <!-- Step 2: Simple Question -->
        <div id="step-2" class="hidden">
            <div class="bg-indigo-50 p-6 rounded-2xl mb-6">
                <p class="text-slate-800 font-bold text-lg leading-snug">ചോദ്യം: കേരളത്തിലെ ആദ്യത്തെ മുഖ്യമന്ത്രി ആര്?</p>
            </div>
            <div class="space-y-3">
                <button onclick="completeQuiz(10)" class="w-full p-4 bg-white border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 rounded-2xl text-left font-bold transition-all">
                    A) ഇ.എം.എസ്. നമ്പൂതിരിപ്പാട്
                </button>
                <button onclick="completeQuiz(0)" class="w-full p-4 bg-white border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 rounded-2xl text-left font-bold transition-all">
                    B) സി. അച്യുതമേനോൻ
                </button>
            </div>
        </div>

        <!-- Step 3: Result & Save -->
        <div id="step-3" class="hidden text-center">
            <div class="mb-6">
                <div class="inline-block p-4 bg-yellow-100 rounded-full mb-4">
                    <span class="text-4xl">🏆</span>
                </div>
                <h2 class="text-2xl font-black text-slate-800">അഭിനന്ദനങ്ങൾ!</h2>
                <p class="text-slate-600 mt-2">നിങ്ങളുടെ സ്കോർ: <span id="display-score" class="text-indigo-600 font-bold text-xl">0</span></p>
            </div>

            <button id="save-btn" onclick="triggerSave()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-100 transition-all">
                സ്കോർ ലിസ്റ്റിലേക്ക് അയക്കുക
            </button>
            <p id="status-message" class="mt-4 text-sm font-bold text-slate-500 h-5"></p>
        </div>
    </div>

    <script>
        let userName = "";
        let score = 0;

        function startQuiz() {
            userName = document.getElementById('user-name').value.trim();
            if (userName === "") {
                alert("ദയവായി പേര് നൽകുക");
                return;
            }
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        function completeQuiz(points) {
            score = points;
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
            document.getElementById('display-score').innerText = score;
        }

        function triggerSave() {
            window.saveQuizResult(userName, score);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Light Juniors - Quiz Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Libraries -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCi-CtVFqpD4nczjeNfuLbTwMz_DJh99Sg",
            authDomain: "thelightjuniors.firebaseapp.com",
            projectId: "thelightjuniors",
            storageBucket: "thelightjuniors.firebasestorage.app",
            messagingSenderId: "961257050705",
            appId: "1:961257050705:web:2914677489b0c488979e70",
            measurementId: "G-0LSV2F4YF7"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // സന്ദർശകൻ ഓതന്റിക്കേറ്റഡ് ആണോ എന്ന് പരിശോധിക്കാനുള്ള വേരിയബിൾ
        let isAuthReady = false;

        // പേജ് ലോഡ് ചെയ്യുമ്പോൾ തന്നെ സൈൻ-ഇൻ ചെയ്യുന്നു
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
                console.log("Authenticated successfully");
            } catch (error) {
                console.error("Auth initialization error:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                isAuthReady = true;
                console.log("User ready:", user.uid);
            }
        });

        initAuth();

        // ഡാറ്റ Firestore-ലേക്ക് അയക്കാനുള്ള ഫങ്ക്ഷൻ
        window.submitScore = async (name, score) => {
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('status-msg');
            
            if (!isAuthReady) {
                status.innerText = "Connecting to server... Please try again in a moment.";
                return;
            }

            btn.disabled = true;
            status.innerText = "Sourcing data to Firestore...";

            try {
                // ഡാറ്റ സേവ് ചെയ്യുന്നു
                await addDoc(collection(db, "quiz_results"), {
                    studentName: name,
                    finalScore: score,
                    submittedAt: serverTimestamp(),
                    userId: auth.currentUser.uid
                });

                status.innerHTML = "<span class='text-green-600 font-bold'>Success! Data saved to Firebase. ✅</span>";
                btn.innerText = "Submitted";
                btn.classList.replace('bg-green-500', 'bg-gray-400');
            } catch (error) {
                console.error("Firestore Error:", error);
                status.innerHTML = "<span class='text-red-600 font-bold'>Error! Check Firestore Rules or Connection. ❌</span>";
                btn.disabled = false;
                btn.innerText = "Retry Saving";
            }
        };
    </script>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-6 font-sans">

    <div id="quiz-container" class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border-t-8 border-indigo-600">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">THE LIGHT JUNIORS</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Online Quiz Competition</p>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2 ml-1">Student Name:</label>
                <input type="text" id="name-input" placeholder="Type your full name" 
                    class="w-full border-2 border-slate-100 rounded-2xl p-4 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all text-lg font-medium bg-slate-50">
            </div>
            <button onclick="startQuiz()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 active:scale-95">
                Start Quiz
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="screen-quiz" class="hidden space-y-6">
            <div class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                <p class="font-bold text-slate-800 text-lg leading-relaxed">Question: How many soorahs are in the Holy Quran?</p>
            </div>
            <div class="space-y-3">
                <button onclick="finishQuiz(10)" class="w-full text-left p-4 bg-white border-2 border-slate-100 rounded-2xl hover:border-indigo-400 hover:bg-indigo-50 font-bold transition-all text-slate-700">A) 114 </button>
                <button onclick="finishQuiz(0)" class="w-full text-left p-4 bg-white border-2 border-slate-100 rounded-2xl hover:border-indigo-400 hover:bg-indigo-50 font-bold transition-all text-slate-700">B) 6666</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="screen-result" class="hidden text-center space-y-6">
            <div class="py-4">
                <div class="inline-block p-4 bg-green-100 rounded-full mb-4">
                    <span class="text-4xl">🏅</span>
                </div>
                <h2 class="text-2xl font-black text-slate-800">Quiz Completed!</h2>
                <p class="text-slate-500 mt-1">Great job on finishing the quiz.</p>
                <div class="mt-4 text-4xl font-black text-indigo-600">
                    <span id="final-score">0</span><span class="text-slate-300 text-xl font-normal">/10</span>
                </div>
            </div>
            
            <div class="space-y-3">
                <button id="save-btn" onclick="saveToCloud()" class="w-full bg-green-500 text-white font-black py-4 rounded-2xl hover:bg-green-600 transition shadow-lg shadow-green-100 active:scale-95">
                    Save to Database
                </button>
                <p id="status-msg" class="text-sm font-bold text-slate-400 h-5"></p>
            </div>
        </div>
    </div>

    <script>
        let userName = "";
        let score = 0;

        function startQuiz() {
            userName = document.getElementById('name-input').value.trim();
            if(!userName) {
                alert("Please enter your name to continue");
                return;
            }
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
        }

        function finishQuiz(points) {
            score = points;
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        function saveToCloud() {
            window.submitScore(userName, score);
        }
    </script>

</body>
</html>

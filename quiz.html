<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Light Juniors - Quiz Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Libraries -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCi-CtVFqpD4nczjeNfuLbTwMz_DJh99Sg",
            authDomain: "thelightjuniors.firebaseapp.com",
            projectId: "thelightjuniors",
            storageBucket: "thelightjuniors.firebasestorage.app",
            messagingSenderId: "961257050705",
            appId: "1:961257050705:web:2914677489b0c488979e70",
            measurementId: "G-0LSV2F4YF7"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Function to save data to Firestore
        window.submitScore = async (name, score) => {
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('status-msg');
            
            btn.disabled = true;
            status.innerText = "Sourcing data to Firestore...";

            try {
                // Anonymous sign-in for security
                await signInAnonymously(auth);
                
                // Saving to 'quiz_results' collection
                // Path: /artifacts/the-light-juniors/public/data/quiz_results
                await addDoc(collection(db, "quiz_results"), {
                    studentName: name,
                    finalScore: score,
                    submittedAt: serverTimestamp()
                });

                status.innerHTML = "<span class='text-green-600'>Success! Data saved to Firebase. ✅</span>";
                btn.innerText = "Submitted";
                btn.classList.add('bg-gray-400');
            } catch (error) {
                console.error("Error saving to Firestore:", error);
                status.innerHTML = "<span class='text-red-600'>Error! Check Firestore Rules. ❌</span>";
                btn.disabled = false;
            }
        };
    </script>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-6">

    <div id="quiz-container" class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border-t-8 border-indigo-600">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-slate-800">THE LIGHT JUNIORS</h1>
            <p class="text-slate-500 text-sm">Online Quiz Competition</p>
        </div>

        <!-- Start Screen -->
        <div id="screen-start">
            <label class="block text-sm font-bold text-slate-600 mb-2">Student Name:</label>
            <input type="text" id="name-input" placeholder="Type name here" 
                class="w-full border-2 border-slate-100 rounded-xl p-3 focus:border-indigo-500 outline-none mb-4">
            <button onclick="startQuiz()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">
                Start Quiz
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="screen-quiz" class="hidden">
            <div class="bg-slate-50 p-4 rounded-xl mb-4">
                <p class="font-bold text-slate-700">Question: How many planets are in our solar system?</p>
            </div>
            <div class="space-y-2">
                <button onclick="finishQuiz(10)" class="w-full text-left p-3 border rounded-xl hover:bg-indigo-50 border-slate-200">A) 8 Planets</button>
                <button onclick="finishQuiz(0)" class="w-full text-left p-3 border rounded-xl hover:bg-indigo-50 border-slate-200">B) 9 Planets</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="screen-result" class="hidden text-center">
            <h2 class="text-xl font-bold text-slate-800 mb-2">Quiz Completed!</h2>
            <p class="text-slate-600 mb-4">Your Score: <span id="final-score" class="text-indigo-600 font-black">0</span></p>
            
            <button id="save-btn" onclick="saveToCloud()" class="w-full bg-green-500 text-white font-bold py-3 rounded-xl hover:bg-green-600 transition">
                Save to Database
            </button>
            <p id="status-msg" class="text-xs mt-3 font-medium text-slate-400"></p>
        </div>
    </div>

    <script>
        let userName = "";
        let score = 0;

        function startQuiz() {
            userName = document.getElementById('name-input').value.trim();
            if(!userName) {
                alert("Please enter a name");
                return;
            }
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
        }

        function finishQuiz(points) {
            score = points;
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        function saveToCloud() {
            window.submitScore(userName, score);
        }
    </script>

</body>
</html>

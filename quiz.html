<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Light Juniors - Quiz Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCi-CtVFqpD4nczjeNfuLbTwMz_DJh99Sg",
            authDomain: "thelightjuniors.firebaseapp.com",
            projectId: "thelightjuniors",
            storageBucket: "thelightjuniors.firebasestorage.app",
            messagingSenderId: "961257050705",
            appId: "1:961257050705:web:2914677489b0c488979e70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "thelightjuniors";

        // State Management
        let user = null;
        let studentData = { name: '', place: '', mobile: '' };
        let studentSelections = Array(10).fill(null);
        let currentQuestion = 0;
        let timeLeft = 600; 
        let timerInterval = null;
        let isSubmitted = false;
        let allResultsData = []; // Store fetched results for export

        // AUTHENTICATION
        onAuthStateChanged(auth, (u) => { user = u; });
        const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) { console.error("Auth failed"); } };
        initAuth();

        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('tlj_name');
            const savedPlace = localStorage.getItem('tlj_place');
            const savedMobile = localStorage.getItem('tlj_mobile');
            if(savedName) document.getElementById('name').value = savedName;
            if(savedPlace) document.getElementById('place').value = savedPlace;
            if(savedMobile) document.getElementById('mobile').value = savedMobile;
        });

        const questions = [
            { q: "What will the people in Paradise be given to drink as mentioned in the current portion?", a: "A pure and refreshing drink", b: "A cup of wine mixed with ginger", c: "A cup of wine mixed with camphor", d: "A bitter drink used for healing", correct: "b" },
            { q: "What is the name of the spring that comes from a root meaning soft or delicious, which is drawn in Paradise?", a: "Kawthar", b: "Zamzam", c: "Tasneem", d: "Salsabeel", correct: "d" },
            { q: "The 'immortal boys' mentioned in the verse refers to:", a: "They are created in paradise to remain therein", b: "They will never change or grow old", c: "They are very handsome", d: "All of the above", correct: "d" },
            { q: "What will you see if you look at Paradise, according to the verse?", a: "Darkness and fear", b: "Chains and raging fire", c: "Bliss and a vast domain", d: "Only empty gardens", correct: "c" },
            { q: "What garments will the people of Paradise wear?", a: "White garments of cotton", b: "Red garments of wool", c: "Blue garments of linen", d: "Green garments of fine silk and heavy brocade", correct: "d" },
            { q: "Which of the following is true about the people of Paradise?", a: "Green garments of fine silk", b: "Adorned with bracelets of silver", c: "Pure beverage from their Lord", d: "All of the above", correct: "d" },
            { q: "The ‘pure beverage’ implies:", a: "No impurity", b: "Delicious but impure", c: "Cleanses their hearts of hurt", d: "Both A and C", correct: "d" },
            { q: "Fill in the blanks: 'And ......................... morning and afternoon'", a: "prostrate to your Lord", b: "Glorify your Lord", c: "Remember the name of your Lord", d: "Both A and B", correct: "c" },
            { q: "Why do the disbelievers pay no heed?", a: "They love this present life", b: "They love the Hereafter", c: "They fear Resurrection", d: "They worship Allah", correct: "a" },
            { q: "Length of the Day of Resurrection:", a: "Infinite", b: "Fifty years", c: "Not defined", d: "Fifty thousand years", correct: "d" }
        ];

        const allowedMobiles = ["966-501797382","966-599122138","966-557544882","91-7356160643","966-576737310","91-8281539208","91-6235828844","966-535768609","966-505191459","44-7624376081","44-7624489327","61-0401619365","91-6235928844","91-6238041679","91-7025511457","91-7025785391","91-7034139883","91-7034253576","91-7034399820","91-7306540074","91-7558871351","91-7560956711","91-7594803054","91-7902448701","91-7902470316","91-7907034843","91-8129686991","91-8129764186","91-8157860261","91-8304063560","91-8714267974","91-8714801835","91-8848193358","91-9037267974","91-9207658678","91-9496699612","91-9539360509","91-9567256340","91-9629988903","91-9633035008","91-9645328773","91-9645395415","91-9656912678","91-9744205385","91-9745616062","91-9817111151","91-9843918413","91-9847193435","91-9847302529","91-9895991116","91-9900953430","91-9946050257","91-9947709622","965-50905731","966-500677517","966-500967745","966-501154403","966-501250188","966-501527780","966-501534407","966-502163791","966-503262990","966-503679542","966-503766632","966-504165135","966-504186982","966-504383232","966-504435135","966-505332710","966-505765817","966-505797935","966-506729657","966-506830680","966-506942737","966-507177103","966-508032152","966-508194715","966-508222053","966-508386571","966-508742148","966-508815960","966-508854732","966-509229487","966-509262992","966-509292062","966-509402136","966-510360426","966-530141819","966-530960342","966-531894076","966-532063993","966-532679687","966-532796405","966-532963089","966-533594582","966-533689757","966-534314336","966-536273182","966-536296334","966-536474235","966-537637215","966-538531297","966-539101716","966-539302907","966-539867101","966-540247380","966-541247266","966-541632275","966-541851574","966-541885929","966-542099671","966-543718439","966-543779651","966-543820213","966-545094153","966-545136406","966-545442493","966-545900025","966-546549197","966-546678286","966-546940420","966-546991610","966-548420429","966-549840171","966-550619441","966-550989676","966-551508035","966-551582755","966-551758148","966-551876182","966-552455305","966-552465305","966-552640798","966-552915784","966-553602809","966-554021052","966-554078961","966-555069168","966-556096654","966-556475906","966-556857931","966-558675808","966-561486272","966-562129566","966-562834251","966-563161829","966-564843475","966-564984695","966-565951942","966-566780847","966-567133278","966-567316632","966-567596578","966-567830655","966-567971022","966-568258888","966-569180023","966-569534791","966-570173640","966-570802341","966-570828420","966-571918309","966-572099478","966-572957971","966-574359871","966-574980699","966-576050581","966-580591263","966-581965286","966-591277136","966-592598969","966-595088137","966-595171618","966-599215214","971-524832451","971-555245457","971-557424082","971-561432359","971-563963407","971-586655864","971-588822419","91-9964946252","965-99794592","966-530992783","966-531458085","966-534495300","966-535460233","966-553382689","966-554415618","966-556752858","966-566443377","966-571053310","966-597053063","91-9633987889","966-506613574","966-535821533","966-548421962","966-565460233","966-571472518","91-7337505186","966-538451880","966-562133065","966-508451880","966-538024360","966-531954480","966-539004619","966-549295586","966-564546985","966-599934246","91-9447156453"];

        const showScreen = (id) => {
            ['login-screen', 'quiz-screen', 'review-screen', 'finish-screen', 'admin-panel'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        };

        const startTimer = () => {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    autoSubmit();
                    return;
                }
                timeLeft--;
                updateTimerUI();
            }, 1000);
        };

        const updateTimerUI = () => {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        };

        const autoSubmit = async () => {
            if (isSubmitted) return;
            alert("Time is up! Your quiz will be submitted automatically.");
            await window.submitResult();
        };

        const checkExistingSubmission = async (mobile) => {
            const resultsRef = collection(db, "artifacts", appId, "public", "data", "quiz_results");
            const q = query(resultsRef); 
            const querySnapshot = await getDocs(q);
            let alreadyExists = false;
            querySnapshot.forEach((doc) => { if(doc.data().mobile === mobile) alreadyExists = true; });
            return alreadyExists;
        };

        window.startQuiz = async () => {
            const name = document.getElementById('name').value.trim();
            const place = document.getElementById('place').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            
            if(!name || !place || !mobile) return alert("Please fill all fields.");
            if(!allowedMobiles.includes(mobile)) return alert("Mobile number not authorized.");

            const submitBtn = document.querySelector('#login-screen button');
            submitBtn.innerText = "Verifying...";
            submitBtn.disabled = true;

            try {
                if(await checkExistingSubmission(mobile)) {
                    alert("This number has already submitted. Multiple attempts are not allowed.");
                    submitBtn.innerText = "CONTINUE";
                    submitBtn.disabled = false;
                    return;
                }
            } catch (e) {
                submitBtn.innerText = "CONTINUE";
                submitBtn.disabled = false;
                return;
            }

            localStorage.setItem('tlj_name', name);
            localStorage.setItem('tlj_place', place);
            localStorage.setItem('tlj_mobile', mobile);
            studentData = { name, place, mobile };
            showScreen('quiz-screen');
            startTimer();
            renderQuestion();
        };

        const renderQuestion = () => {
            const q = questions[currentQuestion];
            document.getElementById('q-title').innerText = `Question ${currentQuestion + 1} of 10`;
            document.getElementById('q-text').innerText = q.q;
            ['a','b','c','d'].forEach(l => {
                const btn = document.getElementById('btn-opt-' + l);
                document.getElementById('opt-' + l).innerText = q[l];
                if (studentSelections[currentQuestion] === l) {
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.remove('bg-white', 'text-slate-700', 'border-slate-200');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.add('bg-white', 'text-slate-700', 'border-slate-200');
                }
            });
            document.getElementById('prev-btn').style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
            document.getElementById('next-btn').innerText = currentQuestion === 9 ? 'Review Answers' : 'Next';
            document.getElementById('progress-bar').style.width = `${(currentQuestion + 1) * 10}%`;
        };

        window.selectOption = (opt) => { studentSelections[currentQuestion] = opt; renderQuestion(); };
        window.goPrev = () => { if (currentQuestion > 0) { currentQuestion--; renderQuestion(); } };
        window.goNextOrReview = () => {
            if (studentSelections[currentQuestion] === null) return alert("Please select an answer.");
            if (currentQuestion < 9) { currentQuestion++; renderQuestion(); } else { showReview(); }
        };

        const showReview = () => {
            showScreen('review-screen');
            const container = document.getElementById('review-list');
            container.innerHTML = '';
            questions.forEach((q, i) => {
                const sel = studentSelections[i];
                const item = document.createElement('div');
                item.className = "flex flex-col p-5 border-b text-sm bg-white";
                item.innerHTML = `<div class="flex justify-between mb-2"><span class="font-black text-blue-600 text-[10px]">Q${i+1}</span><button onclick="editQuestion(${i})" class="text-blue-500 font-bold text-[10px] underline">EDIT</button></div><div class="font-bold mb-3">${q.q}</div><div class="flex items-center gap-3"><span class="w-6 h-6 rounded bg-blue-600 text-white flex items-center justify-center text-[10px]">${sel || '?'}</span><span>${sel ? q[sel] : "No answer"}</span></div>`;
                container.appendChild(item);
            });
        };

        window.editQuestion = (idx) => { currentQuestion = idx; showScreen('quiz-screen'); renderQuestion(); };

        window.submitResult = async () => {
            if (isSubmitted) return;
            const btn = document.getElementById('final-submit-btn');
            btn.disabled = true; btn.innerText = "Saving...";
            const score = studentSelections.filter((sel, i) => sel === questions[i].correct).length;
            try {
                if(await checkExistingSubmission(studentData.mobile)) {
                    alert("A submission for this number already exists.");
                    location.reload();
                    return;
                }
                await addDoc(collection(db, "artifacts", appId, "public", "data", "quiz_results"), {
                    ...studentData, score, selections: studentSelections, at: serverTimestamp()
                });
                isSubmitted = true;
                if(timerInterval) clearInterval(timerInterval);
                showScreen('finish-screen');
            } catch (e) {
                btn.disabled = false; btn.innerText = "CONFIRM & SUBMIT";
            }
        };

        window.openAdmin = () => {
            if(prompt("Admin Password:") === "admin123") { showScreen('admin-panel'); loadResults(); }
            else { alert("Wrong password."); }
        };

        async function loadResults() {
            const qSnap = await getDocs(query(collection(db, "artifacts", appId, "public", "data", "quiz_results"), orderBy("at", "desc")));
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';
            allResultsData = [];
            qSnap.forEach(snap => {
                const d = snap.data();
                allResultsData.push({ id: snap.id, ...d });
                tbody.innerHTML += `<tr class="border-b text-xs"><td class="p-3 font-bold">${d.name}</td><td class="p-3">${d.place}</td><td class="p-3 font-mono">${d.mobile}</td><td class="p-3 text-center font-black">${d.score}/10</td><td class="p-3 text-right"><button onclick="deleteResult('${snap.id}')" class="text-red-400 font-black">X</button></td></tr>`;
            });
            document.getElementById('total-count').innerText = allResultsData.length;
        }

        window.deleteResult = async (id) => {
            if(confirm("Allow student to try again?")) {
                await deleteDoc(doc(db, "artifacts", appId, "public", "data", "quiz_results", id));
                loadResults();
            }
        };

        window.downloadExcel = () => {
            if(allResultsData.length === 0) return alert("No results to download.");
            
            const sheetData = allResultsData.map(res => {
                const row = {
                    "Name": res.name,
                    "Place": res.place,
                    "Mobile": res.mobile,
                    "Score": res.score
                };
                // Add answers Q1 to Q10
                for(let i=0; i<10; i++) {
                    row[`Q${i+1} Selection`] = res.selections ? res.selections[i] : 'N/A';
                }
                return row;
            });

            const ws = XLSX.utils.json_to_sheet(sheetData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Quiz Results");
            XLSX.writeFile(wb, "TLJ_Quiz_Results.xlsx");
        };
    </script>
</head>
<body class="bg-[#f8fafc] min-h-screen p-4 flex flex-col items-center">

    <nav class="w-full max-w-2xl flex justify-between items-center mb-8 mt-2">
        <a href="https://iqkod.github.io/TheLightJuniors/" class="flex items-center gap-2 text-blue-700 font-black text-xs tracking-widest">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            BACK TO HOME
        </a>
        <div class="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-xs font-black flex items-center gap-2 border border-blue-100">
            <span id="timer-display">10:00</span>
        </div>
    </nav>

    <div class="max-w-2xl w-full bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/10 overflow-hidden border border-slate-100">
        <div class="h-2 w-full bg-blue-600"></div>
        <div class="p-8 md:p-12">
            
            <div id="login-screen" class="space-y-6">
                <div class="text-center mb-10">
                    <h1 class="text-4xl font-black text-slate-800 tracking-tight mb-2 uppercase italic">Start Quiz</h1>
                    <p class="text-slate-400 text-sm font-semibold tracking-wide">10 Minutes Limit • One Attempt Only</p>
                </div>
                <input type="text" id="name" placeholder="Full Name" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-slate-700 focus:border-blue-400 transition-colors">
                <input type="text" id="place" placeholder="Your Place" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-slate-700 focus:border-blue-400 transition-colors">
                <input type="text" id="mobile" placeholder="Mobile (966-XXXXXXXXX)" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-slate-700 focus:border-blue-400 transition-colors">
                <button onclick="startQuiz()" class="w-full bg-blue-600 text-white p-6 rounded-[1.5rem] font-black text-xl hover:bg-blue-700 transition-all active:scale-95 shadow-lg shadow-blue-200">CONTINUE</button>
                <div class="text-center pt-8 border-t border-slate-50">
                    <button onclick="openAdmin()" class="text-[10px] font-black tracking-[0.3em] text-slate-200 hover:text-blue-400">Admin Panel</button>
                </div>
            </div>

            <div id="quiz-screen" class="hidden">
                <div class="mb-10">
                    <h2 id="q-title" class="text-sm font-black text-blue-600 uppercase tracking-widest mb-4"></h2>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-500 w-0"></div>
                    </div>
                </div>
                <h3 id="q-text" class="text-xl md:text-2xl font-bold text-slate-800 mb-10 leading-tight"></h3>
                <div class="space-y-4 mb-12">
                    <button id="btn-opt-a" onclick="selectOption('a')" class="w-full text-left p-6 border-2 rounded-2xl transition-all flex items-center gap-6"><span class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-100 text-slate-500 shrink-0">A</span><span id="opt-a" class="flex-1 font-bold"></span></button>
                    <button id="btn-opt-b" onclick="selectOption('b')" class="w-full text-left p-6 border-2 rounded-2xl transition-all flex items-center gap-6"><span class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-100 text-slate-500 shrink-0">B</span><span id="opt-b" class="flex-1 font-bold"></span></button>
                    <button id="btn-opt-c" onclick="selectOption('c')" class="w-full text-left p-6 border-2 rounded-2xl transition-all flex items-center gap-6"><span class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-100 text-slate-500 shrink-0">C</span><span id="opt-c" class="flex-1 font-bold"></span></button>
                    <button id="btn-opt-d" onclick="selectOption('d')" class="w-full text-left p-6 border-2 rounded-2xl transition-all flex items-center gap-6"><span class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-100 text-slate-500 shrink-0">D</span><span id="opt-d" class="flex-1 font-bold"></span></button>
                </div>
                <div class="flex justify-between items-center pt-6 border-t border-slate-50">
                    <button id="prev-btn" onclick="goPrev()" class="text-slate-400 font-black text-xs uppercase tracking-widest">← Back</button>
                    <button id="next-btn" onclick="goNextOrReview()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-sm uppercase">Next</button>
                </div>
            </div>

            <div id="review-screen" class="hidden">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black text-slate-800 italic uppercase">Review Answers</h2>
                </div>
                <div id="review-list" class="space-y-4 mb-10 max-h-[400px] overflow-y-auto pr-2 border rounded-3xl p-4 bg-slate-50/50"></div>
                <button id="final-submit-btn" onclick="submitResult()" class="w-full bg-emerald-600 text-white p-6 rounded-[1.5rem] font-black text-xl hover:bg-emerald-700 shadow-xl shadow-emerald-100">CONFIRM & SUBMIT</button>
            </div>

            <div id="finish-screen" class="hidden text-center py-20">
                <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-3xl font-black mx-auto mb-8">✓</div>
                <h2 class="text-4xl font-black text-slate-800 italic uppercase mb-4">Success!</h2>
                <p class="text-slate-500 font-bold mb-12">Submitted successfully.</p>
                <a href="javascript:location.reload()" class="bg-slate-900 text-white px-12 py-5 rounded-2xl font-black text-xs uppercase tracking-[0.3em]">Home</a>
            </div>

            <div id="admin-panel" class="hidden">
                <div class="mb-6 flex flex-col gap-4">
                    <div class="flex justify-between items-center">
                        <h2 class="font-black text-2xl uppercase">Results (<span id="total-count">0</span>)</h2>
                        <div class="flex gap-4">
                            <button onclick="loadResults()" class="text-blue-600 font-black text-[10px] uppercase">Refresh</button>
                            <button onclick="downloadExcel()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase">Download Excel</button>
                        </div>
                    </div>
                </div>
                <div class="overflow-x-auto border rounded-xl">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 uppercase font-black text-slate-400 text-[10px]">
                            <tr><th class="p-4">Name</th><th class="p-4">Place</th><th class="p-4">Mobile</th><th class="p-4 text-center">Score</th><th class="p-4"></th></tr>
                        </thead>
                        <tbody id="results-body"></tbody>
                    </table>
                </div>
                <button onclick="location.reload()" class="mt-8 text-xs font-bold text-slate-400 uppercase">Exit Admin</button>
            </div>

        </div>
    </div>
</body>
</html>

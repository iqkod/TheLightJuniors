<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Light Juniors - Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Quiz Header -->
    <div class="w-full max-w-md mb-4 flex justify-between items-center">
        <h1 class="text-blue-600 text-sm font-bold">The Light Juniors Quiz</h1>
        <span id="live-status" class="text-slate-400 text-[10px]">Connecting...</span>
    </div>

    <!-- Main Quiz Card -->
    <div id="quiz-container" class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <div class="bg-blue-600 p-8 text-white text-center">
            <h1 class="text-2xl font-black mb-1">ക്വിസ് മത്സരം</h1>
            <p class="opacity-90 font-medium text-sm">സൗദി ഇന്ത്യൻ ഇസ്ലാഹി സെന്റർ</p>
        </div>

        <div class="p-8">
            <!-- Registration -->
            <div id="register-section" class="space-y-4">
                <input id="reg-name" type="text" placeholder="പേര്" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input id="reg-place" type="text" placeholder="സ്ഥലം" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input id="reg-phone" type="text" placeholder="രജിസ്റ്റർ നമ്പർ" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                
                <p id="error-msg" class="text-red-500 text-xs hidden font-bold text-center"></p>
                <button onclick="handleStart()" id="start-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg">തുടങ്ങുക</button>
            </div>

            <!-- Quiz Play Area -->
            <div id="quiz-section" class="hidden-section space-y-6">
                <div class="flex justify-between items-center text-xs font-bold text-blue-600 uppercase">
                    <span id="q-counter">ചോദ്യം 1 / 3</span>
                </div>
                <div class="h-1.5 w-full bg-slate-100 rounded-full">
                    <div id="progress-bar" class="h-full bg-blue-600 rounded-full transition-all duration-300" style="width: 33%"></div>
                </div>
                <h2 id="q-text" class="text-xl font-bold leading-relaxed">ചോദ്യം ലോഡ് ചെയ്യുന്നു...</h2>
                <div id="options-container" class="space-y-3"></div>
            </div>

            <!-- Result -->
            <div id="finish-section" class="hidden-section text-center py-6 space-y-4">
                <div class="text-green-500 text-6xl">✓</div>
                <h2 class="text-2xl font-black">വിജയകരമായി പൂർത്തിയാക്കി!</h2>
                <p class="text-slate-500 text-sm">നിങ്ങളുടെ ഉത്തരങ്ങൾ രേഖപ്പെടുത്തിയിട്ടുണ്ട്. നന്ദി.</p>
                <button onclick="location.reload()" class="text-blue-600 font-bold text-sm underline mt-4">Close</button>
            </div>
        </div>
    </div>

    <!-- Admin View -->
    <div class="mt-8 text-[10px] text-slate-300 select-none cursor-pointer" onclick="toggleAdmin()">ADMIN PANEL</div>
    <div id="admin-section" class="hidden-section w-full max-w-4xl mt-4 bg-white p-6 rounded-xl shadow-lg border overflow-x-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-blue-800">Results (Exel Format)</h3>
            <button onclick="exportToExcel()" class="bg-green-600 text-white text-xs px-3 py-1 rounded">Download Excel</button>
        </div>
        <table id="results-table" class="w-full text-xs text-left border-collapse">
            <thead>
                <tr class="bg-slate-100">
                    <th class="p-2 border">Name</th>
                    <th class="p-2 border">Place</th>
                    <th class="p-2 border">Reg No</th>
                    <th class="p-2 border">Score</th>
                    <th class="p-2 border">Percentage</th>
                    <th class="p-2 border">Answers</th>
                </tr>
            </thead>
            <tbody id="admin-table-body"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

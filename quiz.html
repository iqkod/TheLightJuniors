<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Light Juniors - Quiz Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCi-CtVFqpD4nczjeNfuLbTwMz_DJh99Sg",
            authDomain: "thelightjuniors.firebaseapp.com",
            projectId: "thelightjuniors",
            storageBucket: "thelightjuniors.firebasestorage.app",
            messagingSenderId: "961257050705",
            appId: "1:961257050705:web:2914677489b0c488979e70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "thelightjuniors";

        let user = null;
        let studentData = { name: '', place: '', mobile: '' };
        let studentSelections = Array(10).fill(null);
        let currentQuestion = 0;
        let timeLeft = 600; 
        let timerInterval = null;
        let isSubmitted = false;
        let allResultsData = []; 

        onAuthStateChanged(auth, (u) => { user = u; });
        const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) {} };
        initAuth();

        const questions = [
            { q: "What will the people in Paradise be given to drink as mentioned in the current portion?", a: "A pure and refreshing drink", b: "A cup of wine mixed with ginger", c: "A cup of wine mixed with camphor", d: "A bitter drink used for healing", correct: "b" },
            { q: "What is the name of the spring that comes from a root meaning soft or delicious, which is drawn in Paradise?", a: "Kawthar", b: "Zamzam", c: "Tasneem", d: "Salsabeel", correct: "d" },
            { q: "The 'immortal boys' mentioned in the verse refers to:", a: "They are created in paradise to remain therein", b: "They will never change or grow old", c: "They are very handsome", d: "All of the above", correct: "d" },
            { q: "What will you see if you look at Paradise, according to the verse?", a: "Darkness and fear", b: "Chains and raging fire", c: "Bliss and a vast domain", d: "Only empty gardens", correct: "c" },
            { q: "What garments will the people of Paradise wear?", a: "White garments of cotton", b: "Red garments of wool", c: "Blue garments of linen", d: "Green garments of fine silk and heavy brocade", correct: "d" },
            { q: "Which of the following is true about the people of Paradise?", a: "Green garments of fine silk", b: "Adorned with bracelets of silver", c: "Pure beverage from their Lord", d: "All of the above", correct: "d" },
            { q: "The ‘pure beverage’ implies:", a: "No impurity", b: "Delicious but impure", c: "Cleanses their hearts of heart", d: "Both A and C", correct: "d" },
            { q: "Fill in the blanks: 'And ......................... morning and afternoon'", a: "prostrate to your Lord", b: "Glorify your Lord", c: "Remember the name of your Lord", d: "Both A and B", correct: "c" },
            { q: "Why do the disbelievers pay no heed?", a: "They love this present life", b: "They love the Hereafter", c: "They fear Resurrection", d: "They worship Allah", correct: "a" },
            { q: "Length of the Day of Resurrection:", a: "Infinite", b: "Fifty years", c: "Not defined", d: "Fifty thousand years", correct: "d" }
        ];

        const allowedMobiles = ["966-501797382","966-599122138","966-557544882","91-7356160643","966-576737310","91-8281539208","91-6235828844","966-535768609","966-505191459","44-7624376081","44-7624489327","61-0401619365","91-6235928844","91-6238041679","91-7025511457","91-7025785391","91-7034139883","91-7034253576","91-7034399820","91-7306540074","91-7558871351","91-7560956711","91-7594803054","91-7902448701","91-7902470316","91-7907034843","91-8129686991","91-8129764186","91-8157860261","91-8304063560","91-8714267974","91-8714801835","91-8848193358","91-9037267974","91-9207658678","91-9496699612","91-9539360509","91-9567256340","91-9629988903","91-9633035008","91-9645328773","91-9645395415","91-9656912678","91-9744205385","91-9745616062","91-9817111151","91-9843918413","91-9847193435","91-9847302529","91-9895991116","91-9900953430","91-9946050257","91-9947709622","965-50905731","966-500677517","966-500967745","966-501154403","966-501250188","966-501527780","966-501534407","966-502163791","966-503262990","966-503679542","966-503766632","966-504165135","966-504186982","966-504383232","966-504435135","966-505332710","966-505765817","966-505797935","966-506729657","966-506830680","966-506942737","966-507177103","966-508032152","966-508194715","966-508222053","966-508386571","966-508742148","966-508815960","966-508854732","966-509229487","966-509262992","966-509292062","966-509402136","966-510360426","966-530141819","966-530960342","966-531894076","966-532063993","966-532679687","966-532796405","966-532963089","966-533594582","966-533689757","966-534314336","966-536273182","966-536296334","966-536474235","966-537637215","966-538531297","966-539101716","966-539302907","966-539867101","966-540247380","966-541247266","966-541632275","966-541851574","966-541885929","966-542099671","966-543718439","966-543779651","966-543820213","966-545094153","966-545136406","966-545442493","966-545900025","966-546549197","966-546678286","966-546940420","966-546991610","966-548420429","966-549840171","966-550619441","966-550989676","966-551508035","966-551582755","966-551758148","966-551876182","966-552455305","966-552465305","966-552640798","966-552915784","966-553602809","966-554021052","966-554078961","966-555069168","966-556096654","966-556475906","966-556857931","966-558675808","966-561486272","966-562129566","966-562834251","966-563161829","966-564843475","966-564984695","966-565951942","966-566780847","966-567133278","966-567316632","966-567596578","966-567830655","966-567971022","966-568258888","966-569180023","966-569534791","966-570173640","966-570802341","966-570828420","966-571918309","966-572099478","966-572957971","966-574359871","966-574980699","966-576050581","966-580591263","966-581965286","966-591277136","966-592598969","966-595088137","966-595171618","966-599215214","971-524832451","971-555245457","971-557424082","971-561432359","971-563963407","971-586655864","971-588822419","91-9964946252","965-99794592","966-530992783","966-531458085","966-534495300","966-535460233","966-553382689","966-554415618","966-556752858","966-566443377","966-571053310","966-597053063","91-9633987889","966-506613574","966-535821533","966-548421962","966-565460233","966-571472518","91-7337505186","966-538451880","966-562133065","966-508451880","966-538024360","966-531954480","966-539004619","966-549295586","966-564546985","966-599934246","91-9447156453"];

        const showScreen = (id) => {
            ['login-screen', 'quiz-screen', 'review-screen', 'finish-screen', 'admin-panel', 'student-result-screen', 'pending-screen'].forEach(s => {
                document.getElementById(s)?.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        };

        const getExistingSubmission = async (mobile) => {
            const resultsRef = collection(db, "artifacts", appId, "public", "data", "quiz_results");
            const qSnap = await getDocs(resultsRef);
            let resultData = null;
            qSnap.forEach((doc) => {
                if(doc.data().mobile === mobile) resultData = { id: doc.id, ...doc.data() };
            });
            return resultData;
        };

        window.startQuiz = async () => {
            const name = document.getElementById('name').value.trim();
            const place = document.getElementById('place').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            
            if(!name || !place || !mobile) return alert("Please fill all fields.");
            if(!allowedMobiles.includes(mobile)) return alert("Mobile number not authorized.");

            const submitBtn = document.querySelector('#login-screen button');
            submitBtn.innerText = "Verifying...";
            submitBtn.disabled = true;

            try {
                const existingData = await getExistingSubmission(mobile);
                if(existingData) {
                    if(existingData.approved === true) {
                        showStudentResult(existingData);
                    } else {
                        showScreen('pending-screen');
                    }
                    submitBtn.innerText = "CONTINUE";
                    submitBtn.disabled = false;
                    return;
                }
            } catch (e) {
                console.error(e);
            }

            studentData = { name, place, mobile, approved: false };
            showScreen('quiz-screen');
            startTimer();
            renderQuestion();
            submitBtn.innerText = "CONTINUE";
            submitBtn.disabled = false;
        };

        const showStudentResult = (data) => {
            showScreen('student-result-screen');
            document.getElementById('res-name').innerText = data.name;
            document.getElementById('res-score').innerText = data.score + "/10";
            const container = document.getElementById('res-details');
            container.innerHTML = '';
            questions.forEach((q, i) => {
                const sel = data.selections[i];
                const isCorrect = sel === q.correct;
                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl border-2 ${isCorrect ? 'border-emerald-100 bg-emerald-50' : 'border-red-100 bg-red-50'}`;
                div.innerHTML = `
                    <p class="text-[10px] font-black uppercase text-slate-400 mb-1">Question ${i+1}</p>
                    <p class="font-bold text-slate-800 mb-2">${q.q}</p>
                    <div class="flex flex-col gap-1 text-sm">
                        <p class="${isCorrect ? 'text-emerald-700' : 'text-red-700'}">Your Answer: <span class="font-bold">${q[sel] || 'Not Answered'}</span></p>
                        ${!isCorrect ? `<p class="text-emerald-700">Correct Answer: <span class="font-bold">${q[q.correct]}</span></p>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        };

        const startTimer = () => {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) { clearInterval(timerInterval); autoSubmit(); return; }
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('timer-display').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            }, 1000);
        };

        const renderQuestion = () => {
            const q = questions[currentQuestion];
            document.getElementById('q-title').innerText = `Question ${currentQuestion + 1} of 10`;
            document.getElementById('q-text').innerText = q.q;
            ['a','b','c','d'].forEach(l => {
                const btn = document.getElementById('btn-opt-' + l);
                document.getElementById('opt-' + l).innerText = q[l];
                if (studentSelections[currentQuestion] === l) {
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.remove('bg-white', 'text-slate-700', 'border-slate-200');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.add('bg-white', 'text-slate-700', 'border-slate-200');
                }
            });
            document.getElementById('prev-btn').style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
            document.getElementById('next-btn').innerText = currentQuestion === 9 ? 'Review Answers' : 'Next';
            document.getElementById('progress-bar').style.width = `${(currentQuestion + 1) * 10}%`;
        };

        window.selectOption = (opt) => { studentSelections[currentQuestion] = opt; renderQuestion(); };
        window.goPrev = () => { if (currentQuestion > 0) { currentQuestion--; renderQuestion(); } };
        window.goNextOrReview = () => {
            if (studentSelections[currentQuestion] === null) return alert("Please select an answer.");
            if (currentQuestion < 9) { currentQuestion++; renderQuestion(); } else { showReview(); }
        };

        const showReview = () => {
            showScreen('review-screen');
            const container = document.getElementById('review-list');
            container.innerHTML = '';
            questions.forEach((q, i) => {
                const sel = studentSelections[i];
                container.innerHTML += `<div class="p-4 border-b bg-white rounded-xl mb-2"><p class="text-[10px] font-bold text-blue-500">Q${i+1}</p><p class="font-bold text-slate-800">${q.q}</p><p class="text-sm mt-1">Answer: ${sel ? q[sel] : "..."}</p></div>`;
            });
        };

        window.submitResult = async () => {
            if (isSubmitted) return;
            const btn = document.getElementById('final-submit-btn');
            btn.disabled = true; btn.innerText = "Saving...";
            const score = studentSelections.filter((sel, i) => sel === questions[i].correct).length;
            try {
                await addDoc(collection(db, "artifacts", appId, "public", "data", "quiz_results"), {
                    ...studentData, score, selections: studentSelections, at: serverTimestamp()
                });
                isSubmitted = true;
                if(timerInterval) clearInterval(timerInterval);
                showScreen('finish-screen');
            } catch (e) {
                btn.disabled = false; btn.innerText = "CONFIRM & SUBMIT";
            }
        };

        window.openAdmin = () => {
            if(prompt("Admin Password:") === "admin123") { showScreen('admin-panel'); loadResults(); }
            else { alert("Wrong password."); }
        };

        async function loadResults() {
            const qSnap = await getDocs(query(collection(db, "artifacts", appId, "public", "data", "quiz_results"), orderBy("at", "desc")));
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';
            allResultsData = [];
            qSnap.forEach(snap => {
                const d = snap.data();
                allResultsData.push({ id: snap.id, ...d });
                tbody.innerHTML += `
                <tr class="border-b text-xs">
                    <td class="p-3 font-bold">${d.name}</td>
                    <td class="p-3">${d.mobile}</td>
                    <td class="p-3 text-center font-black">${d.score}/10</td>
                    <td class="p-3 text-center">
                        <button onclick="toggleApproval('${snap.id}', ${d.approved})" class="px-3 py-1 rounded-full font-black text-[9px] ${d.approved ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}">
                            ${d.approved ? 'APPROVED' : 'APPROVE'}
                        </button>
                    </td>
                    <td class="p-3 text-right"><button onclick="deleteResult('${snap.id}')" class="text-red-400 font-black">X</button></td>
                </tr>`;
            });
            document.getElementById('total-count').innerText = allResultsData.length;
        }

        window.toggleApproval = async (id, current) => {
            await updateDoc(doc(db, "artifacts", appId, "public", "data", "quiz_results", id), { approved: !current });
            loadResults();
        };

        window.deleteResult = async (id) => {
            if(confirm("Delete this result?")) {
                await deleteDoc(doc(db, "artifacts", appId, "public", "data", "quiz_results", id));
                loadResults();
            }
        };

        window.downloadExcel = () => {
            if(allResultsData.length === 0) return;
            const ws = XLSX.utils.json_to_sheet(allResultsData.map(r => ({ Name: r.name, Place: r.place, Mobile: r.mobile, Score: r.score, Approved: r.approved })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Results");
            XLSX.writeFile(wb, "TLJ_Results.xlsx");
        };
    </script>
</head>
<body class="bg-[#f8fafc] min-h-screen p-4 flex flex-col items-center">

    <nav class="w-full max-w-2xl flex justify-between items-center mb-8 mt-2">
        <div class="text-blue-700 font-black text-xs tracking-widest uppercase italic">TLJ Quiz</div>
        <div class="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-xs font-black border border-blue-100">
            <span id="timer-display">10:00</span>
        </div>
    </nav>

    <div class="max-w-2xl w-full bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/10 overflow-hidden border border-slate-100">
        <div class="h-2 w-full bg-blue-600"></div>
        <div class="p-8 md:p-12">
            
            <!-- LOGIN -->
            <div id="login-screen" class="space-y-6">
                <div class="text-center mb-10">
                    <h1 class="text-4xl font-black text-slate-800 tracking-tight mb-2 uppercase italic">Portal</h1>
                    <p class="text-slate-400 text-sm font-semibold">Enter mobile to Start or View Results</p>
                </div>
                <input type="text" id="name" placeholder="Full Name" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                <input type="text" id="place" placeholder="Your Place" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                <input type="text" id="mobile" placeholder="Mobile (966-XXXXXXXXX)" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                <button onclick="startQuiz()" class="w-full bg-blue-600 text-white p-6 rounded-[1.5rem] font-black text-xl shadow-lg uppercase">Continue</button>
                <div class="text-center pt-8 border-t border-slate-50">
                    <button onclick="openAdmin()" class="text-[10px] font-black text-slate-200 hover:text-blue-400 uppercase">Admin Panel</button>
                </div>
            </div>

            <!-- QUIZ -->
            <div id="quiz-screen" class="hidden">
                <div class="mb-10 text-center">
                    <h2 id="q-title" class="text-xs font-black text-blue-600 uppercase mb-4"></h2>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-blue-600 h-full w-0"></div>
                    </div>
                </div>
                <h3 id="q-text" class="text-xl font-bold text-slate-800 mb-10 leading-tight"></h3>
                <div class="space-y-4 mb-12">
                    <button id="btn-opt-a" onclick="selectOption('a')" class="w-full text-left p-6 border-2 rounded-2xl flex items-center gap-6"><span class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-100">A</span><span id="opt-a" class="font-bold"></span></button>
                    <button id="btn-opt-b" onclick="selectOption('b')" class="w-full text-left p-6 border-2 rounded-2xl flex items-center gap-6"><span class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-100">B</span><span id="opt-b" class="font-bold"></span></button>
                    <button id="btn-opt-c" onclick="selectOption('c')" class="w-full text-left p-6 border-2 rounded-2xl flex items-center gap-6"><span class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-100">C</span><span id="opt-c" class="font-bold"></span></button>
                    <button id="btn-opt-d" onclick="selectOption('d')" class="w-full text-left p-6 border-2 rounded-2xl flex items-center gap-6"><span class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-100">D</span><span id="opt-d" class="font-bold"></span></button>
                </div>
                <div class="flex justify-between items-center">
                    <button id="prev-btn" onclick="goPrev()" class="text-slate-400 font-black text-xs">← BACK</button>
                    <button id="next-btn" onclick="goNextOrReview()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-sm uppercase">NEXT</button>
                </div>
            </div>

            <!-- REVIEW -->
            <div id="review-screen" class="hidden">
                <h2 class="text-3xl font-black text-slate-800 mb-8 uppercase italic text-center">Review</h2>
                <div id="review-list" class="space-y-4 mb-10 max-h-[400px] overflow-y-auto"></div>
                <button id="final-submit-btn" onclick="submitResult()" class="w-full bg-emerald-600 text-white p-6 rounded-[1.5rem] font-black text-xl uppercase">Submit Now</button>
            </div>

            <!-- PENDING APPROVAL -->
            <div id="pending-screen" class="hidden text-center py-20">
                <div class="w-20 h-20 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center text-3xl font-black mx-auto mb-8">!</div>
                <h2 class="text-3xl font-black text-slate-800 italic uppercase mb-4">Pending Approval</h2>
                <p class="text-slate-500 font-bold mb-12">Your marks will be visible after admin approval. Please check back later.</p>
                <button onclick="location.reload()" class="bg-slate-900 text-white px-12 py-5 rounded-2xl font-black text-xs uppercase">Back Home</button>
            </div>

            <!-- STUDENT RESULT -->
            <div id="student-result-screen" class="hidden">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black text-slate-800 italic uppercase">Your Marks</h2>
                    <p id="res-name" class="font-bold text-slate-400 text-sm"></p>
                </div>
                <div class="bg-slate-900 text-white rounded-3xl p-8 text-center mb-8 shadow-2xl">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Final Score</p>
                    <h1 id="res-score" class="text-6xl font-black italic">0/10</h1>
                </div>
                <div class="space-y-4 mb-10 max-h-[400px] overflow-y-auto pr-2" id="res-details"></div>
                <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-600 p-6 rounded-[1.5rem] font-black text-sm uppercase">Exit</button>
            </div>

            <!-- FINISH -->
            <div id="finish-screen" class="hidden text-center py-20">
                <h2 class="text-4xl font-black text-slate-800 italic uppercase mb-4">Well Done!</h2>
                <p class="text-slate-500 font-bold mb-12">Submitted! Marks will be shown after approval.</p>
                <button onclick="location.reload()" class="bg-slate-900 text-white px-12 py-5 rounded-2xl font-black text-xs uppercase">Home</button>
            </div>

            <!-- ADMIN -->
            <div id="admin-panel" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-2xl italic uppercase">Results (<span id="total-count">0</span>)</h2>
                    <button onclick="downloadExcel()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase">Excel</button>
                </div>
                <div class="overflow-x-auto border rounded-xl">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                            <tr><th class="p-4">Name</th><th class="p-4">Mobile</th><th class="p-4 text-center">Score</th><th class="p-4 text-center">Status</th><th class="p-4"></th></tr>
                        </thead>
                        <tbody id="results-body"></tbody>
                    </table>
                </div>
                <button onclick="location.reload()" class="mt-8 text-xs font-bold text-slate-400 uppercase">Exit Admin</button>
            </div>

        </div>
    </div>
</body>
</html>
